<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hypowork" />
    <title>Hypowork</title>
    <!-- PAPERCLIP_RUNTIME_BRANDING_START -->
    <!-- PAPERCLIP_RUNTIME_BRANDING_END -->
    <!-- PAPERCLIP_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favico.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- PAPERCLIP_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "hypowork.theme";
        const darkThemeColor = "#18181b";
        const midThemeColor = "#f1e9d2";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme =
            stored === "light" || stored === "mid" || stored === "dark" ? stored : "dark";
          const root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.classList.toggle("mid", theme === "mid");
          root.style.colorScheme = theme === "dark" ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            const meta =
              theme === "dark"
                ? darkThemeColor
                : theme === "mid"
                  ? midThemeColor
                  : lightThemeColor;
            themeColorMeta.setAttribute("content", meta);
          }
        } catch {
          const root = document.documentElement;
          root.classList.add("dark");
          root.classList.remove("mid");
          root.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
