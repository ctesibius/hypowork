<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hypowork — abstract H (staggered verticals + bridge). Echo layer suggests depth.
  In-app: HypoworkMark.tsx uses currentColor. Here: prefers-color-scheme for bare <img>.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="Hypowork">
  <title>Hypowork</title>
  <style type="text/css">
    .hw-fill { fill: #171717; }
    .hw-echo { opacity: 0.26; }
    @media (prefers-color-scheme: dark) {
      .hw-fill { fill: #fafafa; }
    }
  </style>
  <g class="hw-echo" transform="translate(0.95 0.65)">
    <rect class="hw-fill" x="4" y="4.5" width="2.65" height="9.25" rx="1.35"/>
    <rect class="hw-fill" x="17.35" y="10" width="2.65" height="10.5" rx="1.35"/>
    <rect class="hw-fill" x="5.35" y="10" width="14.65" height="2.65" rx="1.35"/>
  </g>
  <rect class="hw-fill" x="4" y="4.5" width="2.65" height="9.25" rx="1.35"/>
  <rect class="hw-fill" x="17.35" y="10" width="2.65" height="10.5" rx="1.35"/>
  <rect class="hw-fill" x="5.35" y="10" width="14.65" height="2.65" rx="1.35"/>
</svg>
